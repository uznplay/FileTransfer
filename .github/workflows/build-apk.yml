name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'android/**'
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./android

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Cài Gradle 8.5 thủ công (tránh lỗi cache của gradle/actions)
      - name: Install Gradle 8.5 manually
        run: |
          wget -q "https://services.gradle.org/distributions/gradle-8.5-bin.zip"
          unzip -q gradle-8.5-bin.zip
          echo "GRADLE_HOME=$PWD/gradle-8.5" >> $GITHUB_ENV
          echo "$PWD/gradle-8.5/bin" >> $GITHUB_PATH
        working-directory: /tmp

      - name: Tạo local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Accept SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Build APK
        run: gradle assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FileTransfer-APK
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
