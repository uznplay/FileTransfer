name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'android/**'
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./android

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Debug: in thông tin môi trường
      - name: Debug - show env
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "JAVA_HOME=$JAVA_HOME"
          ls -la $ANDROID_HOME/ 2>/dev/null || echo "No ANDROID_HOME"
          ls -la $ANDROID_HOME/platforms/ 2>/dev/null || echo "No platforms"
          ls -la $ANDROID_HOME/build-tools/ 2>/dev/null || echo "No build-tools"
          which java
          java -version

      # Cài Gradle 8.5
      - name: Install Gradle 8.5
        run: |
          wget -q "https://services.gradle.org/distributions/gradle-8.5-bin.zip"
          unzip -q gradle-8.5-bin.zip
          echo "GRADLE_HOME=$PWD/gradle-8.5" >> $GITHUB_ENV
          echo "$PWD/gradle-8.5/bin" >> $GITHUB_PATH
        working-directory: /tmp

      - name: Verify Gradle
        run: gradle --version

      # Cài SDK components cần thiết
      - name: Install SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>&1

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      # Build APK
      - name: Build APK
        run: gradle assembleDebug --no-daemon --stacktrace --info
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FileTransfer-APK
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
