# ============================================
# GitHub Actions - Build APK tự động
# ============================================
# 
# Cách dùng:
#   1. Push code lên GitHub
#   2. Vào tab "Actions" trên GitHub
#   3. Chọn workflow "Build APK"
#   4. Bấm "Run workflow"
#   5. Đợi build xong, tải file APK từ "Artifacts"
# ============================================

name: Build APK

on:
  workflow_dispatch:        # Chạy thủ công
  push:
    branches: [ "main", "master" ]
    paths:
      - 'android/**'
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./android

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Cài Gradle và tạo gradle-wrapper.jar
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version=8.5

      - name: Build APK with Gradle
        run: ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FileTransfer-APK
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
